<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Recap Radar</title>
<style>
  :root{
    --bg:#0D1117;
    --card:#161B22;
    --border:#262C36;
    --text:#E6EDF3;
    --muted:#7D8590;
    --heat-high:#FF5C39;
    --live:#3FB950;
  }
  *{box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0;padding-bottom:40px;}
  .header{padding:12px 12px 10px;border-bottom:1px solid var(--border);}
  .eyebrow{font-family:"Arial Narrow",sans-serif;letter-spacing:0.18em;text-transform:uppercase;font-size:10px;color:var(--muted);margin-bottom:4px;}
  .title{font-family:"Arial Narrow",Helvetica,sans-serif;font-weight:800;font-size:26px;letter-spacing:0.05em;text-transform:uppercase;margin:0 0 4px;}
  .subtitle{font-size:12px;color:var(--muted);line-height:1.4;max-width:480px;}
  .legend{margin-top:8px;font-size:11px;color:var(--muted);}
  .section{padding:6px 10px;}
  .section-title{font-family:"Arial Narrow",Helvetica,sans-serif;font-weight:700;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin:0 0 4px;display:flex;align-items:center;gap:8px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--live);box-shadow:0 0 0 0 rgba(63,185,80,0.6);animation:pulse 1.6s infinite;flex-shrink:0;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,185,80,0.5);}70%{box-shadow:0 0 0 7px rgba(63,185,80,0);}100%{box-shadow:0 0 0 0 rgba(63,185,80,0);}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 9px;margin-bottom:3px;}
  .card-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:1px;}
  .league{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .meta{font-family:Menlo,Consolas,monospace;font-size:10px;color:var(--muted);white-space:nowrap;}
  .meta.live{color:var(--live);font-weight:600;display:flex;align-items:center;gap:4px;}
  .teams{font-size:13px;font-weight:600;margin:1px 0 3px;line-height:1.25;}
  .stars{font-size:14px;letter-spacing:0px;margin-bottom:2px;color:var(--heat-high);line-height:1;}
  .stars-empty{color:#2D333B;}
  .note{font-size:11px;color:var(--muted);line-height:1.3;}
  .note.postponed{font-style:italic;}
  .toggles-row{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:10px;}
  .toggle-wrap{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);cursor:pointer;user-select:none;}
  .toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
  .toggle input{opacity:0;width:0;height:0;}
  .toggle .slider{position:absolute;inset:0;background:var(--border);border-radius:999px;transition:background .2s;}
  .toggle .slider::before{content:"";position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;}
  .toggle input:checked + .slider{background:var(--heat-high);}
  .toggle input:checked + .slider::before{transform:translateX(16px);}
  .score-final{font-family:Menlo,Consolas,monospace;font-weight:700;font-size:13px;color:var(--text);letter-spacing:0.08em;direction:ltr;}
  .score{font-family:Menlo,Consolas,monospace;font-weight:700;font-size:12px;color:var(--text);display:none;letter-spacing:0.05em;direction:ltr;}
  .card.show-score .score{display:inline-block;}
  .reveal-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:999px;font-size:10px;padding:1px 7px;line-height:1.6;cursor:pointer;font-family:inherit;}
  .reveal-btn:active{border-color:var(--heat-high);color:var(--text);}
  .card.show-score .reveal-btn{display:none;}
  /* Finished card score/reveal visibility controlled by scores-hidden body class */
  .score-final{display:inline-block;}
  .card.finished .reveal-btn-score{display:none;}
  body.scores-hidden .card.finished .score-final{display:none;}
  body.scores-hidden .card.finished .reveal-btn-score{display:inline-block;}
  body.scores-hidden .card.finished.show-score .score-final{display:inline-block;}
  body.scores-hidden .card.finished.show-score .reveal-btn-score{display:none;}
  body.scores-hidden .card.finished:not(.show-score) .recap-link{display:none;}
  .live-meta-wrap{display:flex;align-items:center;gap:6px;}
  .started-ago{font-family:Menlo,Consolas,monospace;font-size:10px;color:var(--muted);}
  .recap-link{display:inline-flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;font-weight:600;color:var(--heat-high);text-decoration:none;border:1px solid var(--border);padding:2px 8px;border-radius:999px;}
  .recap-link:active{border-color:var(--heat-high);}
  footer{padding:14px;color:var(--muted);font-size:10px;text-align:center;line-height:1.6;}
</style>
</head>
<body class="scores-hidden">

<div class="header">
  <div class="eyebrow">FIFA World Cup 2026</div>
  <h1 class="title">Worth the Recap?</h1>
  <p class="subtitle">Tap &#128065; to reveal a score. Stars = how worth watching it was.</p>
  <div class="legend">
    <span style="color:var(--heat-high)">★★★★★</span> all-time classic &nbsp;·&nbsp;
    <span style="color:var(--heat-high)">★★★</span> decent &nbsp;·&nbsp;
    <span style="color:var(--heat-high)">★</span> skip it
  </div>
  <div class="toggles-row">
    <label class="toggle-wrap">
      <span class="toggle"><input type="checkbox" id="hideScoresToggle" checked><span class="slider"></span></span>
      Hide scores
    </label>
    <label class="toggle-wrap">
      <span class="toggle"><input type="checkbox" id="liveToggle"><span class="slider"></span></span>
      Live only
    </label>
  </div>
  <div style="margin-top:8px;font-family:Menlo,Consolas,monospace;font-size:10px;color:var(--muted);">&#128337; Updated %%SNAPSHOT%% · %%TODAY%%</div>
</div>

%%LIVE%%
%%FINISHED%%
%%UPCOMING%%

<footer>
  Auto-updated: %%TODAY%%, %%SNAPSHOT%% Israel time &middot; data: ESPN
</footer>

<script>
  const hideScoresToggle = document.getElementById('hideScoresToggle');
  const liveToggle = document.getElementById('liveToggle');

  // Restore hide-scores state from localStorage (default: hidden)
  const savedHide = localStorage.getItem('hideScores');
  if (savedHide === 'false') {
    hideScoresToggle.checked = false;
    document.body.classList.remove('scores-hidden');
  }

  hideScoresToggle.addEventListener('change', function() {
    if (this.checked) {
      document.body.classList.add('scores-hidden');
      document.querySelectorAll('.card.finished.show-score').forEach(c => c.classList.remove('show-score'));
    } else {
      document.body.classList.remove('scores-hidden');
    }
    localStorage.setItem('hideScores', this.checked);
  });

  document.addEventListener('click', function(e){
    const btn = e.target.closest('.reveal-btn, .reveal-btn-score');
    if (btn) btn.closest('.card').classList.add('show-score');
  });

  function applyFilters(){
    document.querySelectorAll('.section').forEach(function(section){
      let visible = 0;
      section.querySelectorAll('.card').forEach(function(card){
        const show = !liveToggle.checked || card.dataset.live === 'true';
        card.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      section.style.display = visible === 0 ? 'none' : '';
    });
  }

  liveToggle.addEventListener('change', applyFilters);

  function formatSince(ms, isLive){
    const mins = Math.max(0, Math.floor(ms / 60000));
    const hrs  = Math.floor(mins / 60);
    const rem  = mins % 60;
    const span = mins < 60 ? `${mins}m` : (rem ? `${hrs}h ${rem}m` : `${hrs}h`);
    return isLive ? (mins < 1 ? 'just started' : `${span}`) : `${span} ago`;
  }

  function updateStartedTimes(){
    document.querySelectorAll('.card[data-started-at]').forEach(card => {
      const span = card.querySelector('.started-ago');
      if (!span) return;
      span.textContent = formatSince(Date.now() - new Date(card.dataset.startedAt).getTime(), card.dataset.live === 'true');
    });
  }

  updateStartedTimes();
  setInterval(updateStartedTimes, 60000);
</script>
</body>
</html>
